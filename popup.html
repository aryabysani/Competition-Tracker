<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competition Tracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <!-- ── Header ───────────────────────────────────────────────────────── -->
    <header class="header">
      <div class="header-left">
        <img class="logo" src="unstop-logo.svg" alt="Unstop" />
        <div class="header-text">
          <h1 class="title">Competition Tracker</h1>
          <p class="sync-time" id="syncTime">Never synced</p>
        </div>
      </div>
      <div class="header-right">
        <div class="active-badge" id="activeCount" title="Active competitions">0</div>
        <button class="reg-btn" id="goToRegistrations" title="Open your registrations on Unstop">
          My Registrations ↗
        </button>
      </div>
    </header>

    <!-- ── Competition Cards ─────────────────────────────────────────────── -->
    <div class="competition-list" id="competitionList" role="list"></div>

    <!-- ── Empty State ───────────────────────────────────────────────────── -->
    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-icon" aria-hidden="true">📭</div>
      <p class="empty-title">No competitions tracked yet.</p>
      <p class="empty-subtitle">Visit any competition you have registered for on Unstop — the extension will detect and track it automatically.</p>
      <button class="go-btn" id="goToUnstop">Browse Unstop →</button>
    </div>

    <!-- ── Footer ────────────────────────────────────────────────────────── -->
    <footer class="footer">
      <span class="footer-hint">Open a registered competition to track it</span>
      <span class="footer-count" id="footerCount">0 active</span>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
