<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competition Tracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <!-- ── Header ───────────────────────────────────────────────────────── -->
    <header class="header">
      <div class="header-left">
        <div class="logo" aria-hidden="true">🏆</div>
        <div class="header-text">
          <h1 class="title">Competition Tracker</h1>
          <p class="sync-time" id="syncTime">Never synced</p>
        </div>
      </div>
      <div class="active-badge" id="activeCount" title="Active competitions">0</div>
    </header>

    <p class="sync-hint">💡 Sync: open <strong>unstop.com/user/registrations</strong> while logged in</p>

    <!-- ── Competition Cards ─────────────────────────────────────────────── -->
    <div class="competition-list" id="competitionList" role="list"></div>

    <!-- ── Empty State ───────────────────────────────────────────────────── -->
    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-icon" aria-hidden="true">📭</div>
      <p class="empty-title">No competitions tracked yet.</p>
      <p class="empty-subtitle">Visit unstop.com while logged in to auto-sync your registered competitions.</p>
      <button class="go-btn" id="goToUnstop">Go to Unstop →</button>
    </div>

    <!-- ── Footer ────────────────────────────────────────────────────────── -->
    <footer class="footer">
      <span class="footer-sync">🔄 unstop.com/user/registrations</span>
      <span class="footer-count" id="footerCount">0 active</span>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
